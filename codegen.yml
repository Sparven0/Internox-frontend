schema: "https://internox.duckdns.org/graphql"
documents: "src/GraphQL/*.ts"
generates:
  src/__generated__/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
    config:
      defaultScalarType: "unknown"
      nonOptionalTypename: true
      skipTypeNameForRoot: true
      useTypeImports: true
